server.port=${PORT:8080}
server.servlet.context-path=/api

# CORS configuration for React frontend
# Updated: Added multiplayer backend support
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,https://nice-sand-04c84f41e.1.azurestaticapps.net,https://mmgame.hyacinthwings.co.uk}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Logging configuration
logging.level.com.mastermind=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
# Deployment trigger

# Application Insights
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Application specific properties
mastermind.game.slot-count=4
mastermind.game.colors=red,blue,green,yellow,purple,cyan

###############################
# Azure SQL datasource (recommended)
###############################
# Configure these via environment variables in your deployment
# Example values:
# AZURE_SQL_SERVER=myserver.database.windows.net
# AZURE_SQL_DATABASE=masterminddb
# AZURE_SQL_USER=<db_user>
# AZURE_SQL_PASSWORD=<db_password>

# JDBC URL for Azure SQL using env vars (defaults left intentionally blank)
spring.datasource.url=jdbc:sqlserver://${AZURE_SQL_SERVER:localhost}:1433;database=${AZURE_SQL_DATABASE:master};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
spring.datasource.username=${AZURE_SQL_USER:sa}
spring.datasource.password=${AZURE_SQL_PASSWORD:}

# Disable Hibernate auto DDL in production; use Flyway migrations instead
spring.jpa.hibernate.ddl-auto=none

# Enable Flyway migrations (place SQL files under src/main/resources/db/migration)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration